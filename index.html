<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vertex Computers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --deep-blue: #0A2342;
      --accent: #00A8E8;
      --light-bg: #F4F8FB;
      --white: #fff;
      --shadow: 0 8px 32px 0 rgba(10,35,66,0.15);
    }
    body {
      font-family: 'Montserrat', Arial, sans-serif;
      background: var(--light-bg);
      color: var(--deep-blue);
      margin: 0;
    }
    header {
      background: var(--white);
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 3rem;
      position: sticky;
      top: 0;
      z-index: 100;
      animation: slideDown 1s cubic-bezier(.77,0,.18,1) 0.2s both;
    }
    @keyframes slideDown {
      from { transform: translateY(-100px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: 2rem;
      font-weight: 700;
      color: var(--deep-blue);
    }
    .logo svg { width: 40px; height: 40px; }
    nav a, nav button {
      color: var(--deep-blue);
      text-decoration: none;
      margin-left: 2rem;
      font-weight: 500;
      font-size: 1.1rem;
      background: none;
      border: none;
      cursor: pointer;
      position: relative;
      transition: color 0.2s;
    }
    nav a:hover, nav button:hover {
      color: var(--accent);
    }
    .logout-btn {
      margin-left: 10px;
      background: var(--deep-blue);
      color: var(--white);
      border: none;
      border-radius: 10px;
      padding: 0.3rem 1rem;
      cursor: pointer;
    }
    .main-view { min-height: 60vh; }
    .hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4rem 3rem 2rem 3rem;
      background: linear-gradient(120deg, var(--deep-blue) 60%, var(--accent) 100%);
      color: var(--white);
      min-height: 60vh;
      position: relative;
      overflow: hidden;
      animation: fadeIn 1.2s cubic-bezier(.77,0,.18,1) 0.5s both;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.98);}
      to { opacity: 1; transform: scale(1);}
    }
    .hero-content {
      max-width: 600px;
      z-index: 2;
    }
    .hero-title {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 1rem;
      letter-spacing: 1px;
      animation: slideUp 1s cubic-bezier(.77,0,.18,1) 0.7s both;
    }
    @keyframes slideUp {
      from { transform: translateY(60px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .hero-desc {
      font-size: 1.3rem;
      margin-bottom: 2rem;
      line-height: 1.5;
      animation: fadeIn 1.2s cubic-bezier(.77,0,.18,1) 1s both;
    }
    .cta-btn {
      background: var(--accent);
      color: var(--white);
      padding: 1rem 2.5rem;
      border: none;
      border-radius: 30px;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 16px 0 rgba(0,168,232,0.15);
      transition: background 0.2s, transform 0.2s;
      animation: popIn 0.8s cubic-bezier(.77,0,.18,1) 1.2s both;
    }
    .cta-btn:hover {
      background: #0077b6;
      transform: scale(1.05);
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.8);}
      to { opacity: 1; transform: scale(1);}
    }
    .hero-img {
      width: 420px;
      animation: float 3s ease-in-out infinite alternate;
      z-index: 1;
    }
    @keyframes float {
      from { transform: translateY(0);}
      to { transform: translateY(-30px);}
    }
    .section-title {
      text-align: center;
      font-size: 2.5rem;
      font-weight: 700;
      margin: 3rem 0 1.5rem 0;
      color: var(--deep-blue);
      letter-spacing: 1px;
      animation: fadeIn 1.2s cubic-bezier(.77,0,.18,1) 0.5s both;
    }
    .products-list {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 2.5rem;
      padding: 2rem 3rem;
      animation: fadeIn 1.2s cubic-bezier(.77,0,.18,1) 1.2s both;
    }
    .product-card {
      background: var(--white);
      border-radius: 20px;
      box-shadow: var(--shadow);
      width: 320px;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform 0.3s, box-shadow 0.3s;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      animation: popIn 0.8s cubic-bezier(.77,0,.18,1) both;
    }
    .product-card:hover {
      transform: translateY(-10px) scale(1.03);
      box-shadow: 0 16px 40px 0 rgba(10,35,66,0.18);
    }
    .product-img {
      width: 120px;
      margin-bottom: 1.2rem;
      animation: float 2.5s ease-in-out infinite alternate;
    }
    .product-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: var(--deep-blue);
    }
    .product-desc {
      font-size: 1rem;
      color: #444;
      margin-bottom: 1rem;
      text-align: center;
    }
    .product-price {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 1rem;
    }
    .buy-btn {
      background: var(--deep-blue);
      color: var(--white);
      border: none;
      border-radius: 20px;
      padding: 0.7rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }
    .buy-btn:hover {
      background: var(--accent);
      transform: scale(1.05);
    }
    .comment-section {
      margin-top: 1rem;
      width: 100%;
    }
    .comment-section input {
      width: 70%;
      padding: 0.5rem;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    .comment-section button {
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: var(--white);
      margin-left: 0.5rem;
    }
    .comments-list {
      margin-top: 0.5rem;
      max-height: 100px;
      overflow-y: auto;
    }
    .comment {
      background: var(--light-bg);
      border-radius: 8px;
      padding: 0.5rem;
      margin-bottom: 0.3rem;
    }
    .cart {
      max-width: 600px;
      margin: 2rem auto;
      background: var(--white);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 2rem;
    }
    .cart-total {
      font-weight: bold;
      margin-top: 1rem;
    }
    .checkout-btn {
      background: var(--accent);
      color: var(--white);
      border: none;
      border-radius: 10px;
      padding: 0.7rem 2rem;
      margin-top: 1rem;
      cursor: pointer;
    }
    .auth-form {
      max-width: 400px;
      margin: 2rem auto;
      background: var(--white);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .about {
      background: var(--white);
      margin: 3rem 0;
      padding: 2.5rem 3rem;
      border-radius: 20px;
      box-shadow: var(--shadow);
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
      animation: fadeIn 1.2s cubic-bezier(.77,0,.18,1) 1.5s both;
    }
    .about-ceo {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-top: 1.5rem;
    }
    .ceo-img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--deep-blue);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
      font-size: 2.5rem;
      font-weight: 700;
      box-shadow: 0 4px 16px 0 rgba(10,35,66,0.12);
    }
    .ceo-info {
      font-size: 1.1rem;
      color: #333;
    }
    .admin-form {
      max-width: 400px;
      margin: 2rem auto;
      background: var(--white);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .admin-products-list {
      max-width: 800px;
      margin: 2rem auto;
      background: var(--white);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 2rem;
    }
    .admin-products-list h3 {
      margin-top: 0;
    }
    .admin-products-list ul {
      padding-left: 1.2em;
    }
    .admin-products-list li {
      margin-bottom: 0.5em;
    }
    .admin-products-list button {
      margin-left: 1em;
      background: #e74c3c;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0.2em 0.8em;
      cursor: pointer;
    }
    footer {
      background: var(--deep-blue);
      color: var(--white);
      text-align: center;
      padding: 2rem 0 1rem 0;
      margin-top: 3rem;
      font-size: 1rem;
      letter-spacing: 1px;
    }
    /* Responsive */
    @media (max-width: 900px) {
      .hero { flex-direction: column; text-align: center; padding: 3rem 1.5rem;}
      .hero-img { width: 300px; margin-top: 2rem;}
      .products-list { padding: 2rem 1rem;}
      .about { padding: 2rem 1rem;}
    }
    @media (max-width: 600px) {
      header { flex-direction: column; padding: 1rem;}
      .logo { font-size: 1.3rem;}
      .hero-title { font-size: 2rem;}
      .section-title { font-size: 1.5rem;}
      .product-card { width: 95%;}
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <svg width="40" height="40" viewBox="0 0 60 60" fill="none">
        <circle cx="30" cy="30" r="28" stroke="#0A2342" stroke-width="4" fill="#0A2342"/>
        <polygon points="30,10 50,50 10,50" fill="#fff"/>
        <text x="30" y="38" text-anchor="middle" fill="#0A2342" font-size="14" font-family="Arial" font-weight="bold">V</text>
      </svg>
      Vertex Computers
    </div>
    <nav id="main-nav">
      <a href="#" data-page="home">Home</a>
      <a href="#" data-page="products">Products</a>
      <a href="#" data-page="about">About</a>
      <a href="#" data-page="contact">Contact</a>
      <a href="#" data-page="cart" id="cart-link">Cart (0)</a>
      <a href="#" data-page="admin" id="admin-link">Admin</a>
      <span id="user-nav"></span>
    </nav>
  </header>
  <div class="main-view" id="main-view"></div>
  <footer>
    &copy; 2025 Vertex Computers. All rights reserved.<br>
    Designed by Vertex Team | CEO: Abdur Rashed Raj
  </footer>
  <script>
    // --- Data ---
    const defaultProducts = [
      { id: 1, title: "Vertex UltraGamer", desc: "RTX 4090, Intel i9, 32GB RAM, 2TB SSD. Built for extreme gaming and VR.", price: 3499, img: "https://cdn-icons-png.flaticon.com/512/1055/1055687.png" },
      { id: 2, title: "Vertex CreatorPro", desc: "AMD Ryzen 9, 64GB RAM, RTX 4080, 4TB SSD. Perfect for creators and designers.", price: 3999, img: "https://cdn-icons-png.flaticon.com/512/1055/1055672.png" },
      { id: 3, title: "Vertex OfficeX", desc: "Intel i5, 16GB RAM, 512GB SSD. Reliable and efficient for everyday work.", price: 899, img: "https://cdn-icons-png.flaticon.com/512/1055/1055676.png" },
      { id: 4, title: "Vertex MiniBox", desc: "Ultra-compact, Intel i7, 16GB RAM, 1TB SSD. Power in a small package.", price: 1199, img: "https://cdn-icons-png.flaticon.com/512/1055/1055679.png" },
    ];

    function getProducts() {
      return JSON.parse(localStorage.getItem("products")) || defaultProducts;
    }
    function setProducts(products) {
      localStorage.setItem("products", JSON.stringify(products));
    }

    // --- State ---
    let currentUser = JSON.parse(localStorage.getItem("user")) || null;
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let isAdmin = false;

    // --- Navigation ---
    function setPage(page) {
      window.location.hash = page;
      renderPage(page);
    }
    function renderNav() {
      // Cart count
      document.getElementById("cart-link").textContent = `Cart (${cart.length})`;
      // User nav
      const userNav = document.getElementById("user-nav");
      if (currentUser) {
        userNav.innerHTML = `
          <span style="margin-left:10px;">Hi, ${currentUser.username}</span>
          <button class="logout-btn" id="logout-btn">Logout</button>
        `;
        setTimeout(() => {
          document.getElementById("logout-btn").onclick = () => {
            currentUser = null;
            localStorage.removeItem("user");
            renderNav();
            setPage("home");
          };
        }, 10);
      } else {
        userNav.innerHTML = `
          <a href="#" data-page="login">Login</a>
          <a href="#" data-page="register">Register</a>
        `;
      }
    }
    document.getElementById("main-nav").onclick = function(e) {
      if (e.target.dataset.page) {
        e.preventDefault();
        setPage(e.target.dataset.page);
      }
    };

    // --- Pages ---
    function renderPage(page) {
      renderNav();
      const main = document.getElementById("main-view");
      if (page === "home" || !page) {
        main.innerHTML = `
          <section class="hero">
            <div class="hero-content">
              <div class="hero-title">Unleash Performance.<br>Experience Innovation.</div>
              <div class="hero-desc">
                Discover the next generation of custom-built PCs, designed for gamers, creators, and professionals. At Vertex Computers, we blend power, style, and reliability for your digital world.
              </div>
              <button class="cta-btn" id="shop-now-btn">Shop Now</button>
            </div>
            <img class="hero-img" src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8?auto=format&fit=crop&w=600&q=80" alt="Modern PC">
          </section>
        `;
        document.getElementById("shop-now-btn").onclick = () => setPage("products");
      }
      else if (page === "products") {
        const products = getProducts();
        main.innerHTML = `
          <div class="section-title">Our Products</div>
          <div class="products-list" id="products-list"></div>
        `;
        const list = document.getElementById("products-list");
        list.innerHTML = products.map(p => `
          <div class="product-card" data-id="${p.id}">
            <img class="product-img" src="${p.img}" alt="${p.title}">
            <div class="product-title">${p.title}</div>
            <div class="product-desc">${p.desc}</div>
            <div class="product-price">$${p.price}</div>
            <button class="buy-btn" data-id="${p.id}">Add to Cart</button>
            <div class="comment-section" id="comment-section-${p.id}">
              <form class="comment-form" data-id="${p.id}">
                <input type="text" placeholder="Add a comment..." ${currentUser ? "" : "disabled"}>
                <button type="submit" ${currentUser ? "" : "disabled"}>Post</button>
              </form>
              <div class="comments-list" id="comments-list-${p.id}"></div>
            </div>
          </div>
        `).join("");
        // Add to cart
        list.querySelectorAll(".buy-btn").forEach(btn => {
          btn.onclick = function() {
            const id = +this.dataset.id;
            cart.push(getProducts().find(p => p.id === id));
            localStorage.setItem("cart", JSON.stringify(cart));
            renderNav();
            alert("Added to cart!");
          };
        });
        // Comments
        getProducts().forEach(p => renderComments(p.id));
        list.querySelectorAll(".comment-form").forEach(form => {
          form.onsubmit = function(e) {
            e.preventDefault();
            if (!currentUser) return alert("Please login to comment.");
            const id = +this.dataset.id;
            const input = this.querySelector("input");
            const text = input.value.trim();
            if (!text) return;
            const comments = JSON.parse(localStorage.getItem("comments-" + id)) || [];
            comments.push({ user: currentUser.username, text, date: new Date().toLocaleString() });
            localStorage.setItem("comments-" + id, JSON.stringify(comments));
            input.value = "";
            renderComments(id);
          };
        });
      }
      else if (page === "about") {
        main.innerHTML = `
          <div class="section-title">About Vertex Computers</div>
          <section class="about">
            <p>
              <strong>Vertex Computers</strong> is dedicated to delivering high-performance, reliable, and beautifully designed computers for every need. Whether you’re a gamer, a creative professional, or a business user, our systems are built with the latest technology and meticulous attention to detail.
            </p>
            <div class="about-ceo">
              <div class="ceo-img">AR</div>
              <div class="ceo-info">
                <strong>Abdur Rashed Raj</strong><br>
                CEO & Founder<br>
                <span style="color:var(--accent)">"Empowering your digital journey with innovation and trust."</span>
              </div>
            </div>
          </section>
        `;
      }
      else if (page === "contact") {
        main.innerHTML = `
          <div class="section-title">Contact Us</div>
          <section class="about">
            <p>
              Have questions or need a custom build? Reach out to our team!
            </p>
            <form id="contactForm" style="max-width:500px;margin:auto;">
              <input type="text" placeholder="Your Name" required style="width:100%;padding:0.8rem;margin-bottom:1rem;border-radius:10px;border:1px solid #ccc;">
              <input type="email" placeholder="Your Email" required style="width:100%;padding:0.8rem;margin-bottom:1rem;border-radius:10px;border:1px solid #ccc;">
              <textarea placeholder="Your Message" required style="width:100%;padding:0.8rem;margin-bottom:1rem;border-radius:10px;border:1px solid #ccc;min-height:100px;"></textarea>
              <button type="submit" class="cta-btn" style="width:100%;">Send Message</button>
            </form>
            <div id="formMessage" style="text-align:center;margin-top:1rem;color:var(--accent);font-weight:600;"></div>
          </section>
        `;
        document.getElementById("contactForm").onsubmit = function(e) {
          e.preventDefault();
          document.getElementById("formMessage").textContent = "Thank you for contacting us! We'll get back to you soon.";
          this.reset();
        };
      }
      else if (page === "cart") {
        main.innerHTML = `
          <div class="cart">
            <h2>Your Cart</h2>
            <ul id="cart-list"></ul>
            <div class="cart-total" id="cart-total"></div>
            <button class="checkout-btn" id="checkout-btn">Checkout</button>
          </div>
        `;
        const list = document.getElementById("cart-list");
        if (cart.length === 0) {
          list.innerHTML = "<li>Cart is empty.</li>";
          document.getElementById("cart-total").textContent = "";
          document.getElementById("checkout-btn").style.display = "none";
        } else {
          list.innerHTML = cart.map((item, i) => `
            <li>
              ${item.title} - $${item.price}
              <button data-i="${i}" style="margin-left:10px;">Remove</button>
            </li>
          `).join("");
          document.getElementById("cart-total").textContent = "Total: $" + cart.reduce((sum, item) => sum + item.price, 0);
          document.getElementById("checkout-btn").style.display = "";
          list.querySelectorAll("button").forEach(btn => {
            btn.onclick = function() {
              cart.splice(+this.dataset.i, 1);
              localStorage.setItem("cart", JSON.stringify(cart));
              renderPage("cart");
              renderNav();
            };
          });
          document.getElementById("checkout-btn").onclick = () => alert("Checkout is a demo!");
        }
      }
      else if (page === "login") {
        main.innerHTML = `
          <form class="auth-form" id="login-form">
            <h2>Login</h2>
            <input placeholder="Username" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">Login</button>
          </form>
        `;
        document.getElementById("login-form").onsubmit = function(e) {
          e.preventDefault();
          const username = this.querySelector("input").value;
          currentUser = { username };
          localStorage.setItem("user", JSON.stringify(currentUser));
          renderNav();
          setPage("home");
        };
      }
      else if (page === "register") {
        main.innerHTML = `
          <form class="auth-form" id="register-form">
            <h2>Register</h2>
            <input placeholder="Username" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">Register</button>
          </form>
        `;
        document.getElementById("register-form").onsubmit = function(e) {
          e.preventDefault();
          const username = this.querySelector("input").value;
          currentUser = { username };
          localStorage.setItem("user", JSON.stringify(currentUser));
          renderNav();
          setPage("home");
        };
      }
      else if (page === "admin") {
        if (!isAdmin) {
          main.innerHTML = `
            <form class="admin-form" id="admin-login-form">
              <h2>Admin Login</h2>
              <input type="password" placeholder="Admin Password" required>
              <button type="submit">Unlock</button>
              <div id="admin-error" style="color:#e74c3c;"></div>
            </form>
          `;
          document.getElementById("admin-login-form").onsubmit = function(e) {
            e.preventDefault();
            const pass = this.querySelector("input").value;
            if (pass === "#Rashed1978") {
              isAdmin = true;
              renderPage("admin");
            } else {
              document.getElementById("admin-error").textContent = "Incorrect password!";
            }
          };
        } else {
          // Admin unlocked
          main.innerHTML = `
            <form class="admin-form" id="add-product-form">
              <h2>Add New Product</h2>
              <input name="title" placeholder="Product Title" required>
              <input name="desc" placeholder="Description" required>
              <input name="price" type="number" min="1" placeholder="Price (USD)" required>
              <input name="img" placeholder="Image URL" required>
              <button type="submit">Add Product</button>
              <button type="button" id="admin-logout" style="background:#e74c3c;">Lock Admin</button>
              <div id="admin-success" style="color:var(--accent);"></div>
            </form>
            <div class="admin-products-list">
              <h3>All Products</h3>
              <ul id="admin-products-list"></ul>
            </div>
          `;
          // Add product
          document.getElementById("add-product-form").onsubmit = function(e) {
            e.preventDefault();
            const f = this;
            const products = getProducts();
            const newId = products.length ? Math.max(...products.map(p=>p.id))+1 : 1;
            products.push({
              id: newId,
              title: f.title.value,
              desc: f.desc.value,
              price: +f.price.value,
              img: f.img.value
            });
            setProducts(products);
            document.getElementById("admin-success").textContent = "Product added!";
            f.reset();
            renderAdminProducts();
          };
          document.getElementById("admin-logout").onclick = function() {
            isAdmin = false;
            renderPage("admin");
          };
          renderAdminProducts();
        }
      }
    }

    function renderAdminProducts() {
      const products = getProducts();
      const list = document.getElementById("admin-products-list");
      if (!list) return;
      list.innerHTML = products.map(p => `
        <li>
          <b>${p.title}</b> - $${p.price}
          <button data-id="${p.id}">Delete</button>
        </li>
      `).join("");
      list.querySelectorAll("button").forEach(btn => {
        btn.onclick = function() {
          if (confirm("Delete this product?")) {
            let products = getProducts();
            products = products.filter(p => p.id != this.dataset.id);
            setProducts(products);
            renderAdminProducts();
          }
        };
      });
    }

    function renderComments(id) {
      const comments = JSON.parse(localStorage.getItem("comments-" + id)) || [];
      const list = document.getElementById("comments-list-" + id);
      if (list) {
        list.innerHTML = comments.map(c => `
          <div class="comment">
            <strong>${c.user}</strong> <span>(${c.date})</span>
            <div>${c.text}</div>
          </div>
        `).join("");
      }
    }

    // --- Routing ---
    window.onhashchange = () => {
      const page = window.location.hash.replace("#", "") || "home";
      renderPage(page);
    };

    // --- Initial Render ---
    renderPage(window.location.hash.replace("#", "") || "home");
  </script>
</body>
</html>
